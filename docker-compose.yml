version: '3.8'

services:
  backend:
    build: ./backend
    container_name: molecular-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: molecular-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=http://158.160.224.150:3001
    depends_on:
      - backend
    restart: unless-stopped